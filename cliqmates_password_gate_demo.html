
<style>
  .gate { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:340px; padding:2rem; }
  .gate-card { background:var(--color-background-primary); border:0.5px solid var(--color-border-tertiary); border-radius:var(--border-radius-lg); padding:2rem 2.5rem; width:100%; max-width:360px; text-align:center; }
  .gate-icon { font-size:32px; color:var(--color-text-secondary); margin-bottom:1rem; }
  .gate-title { font-size:18px; font-weight:500; margin:0 0 0.5rem; color:var(--color-text-primary); }
  .gate-sub { font-size:14px; color:var(--color-text-secondary); margin:0 0 1.5rem; }
  .gate-input { width:100%; box-sizing:border-box; margin-bottom:0.75rem; }
  .gate-btn { width:100%; padding:10px; background:var(--color-background-secondary); border:0.5px solid var(--color-border-secondary); border-radius:var(--border-radius-md); cursor:pointer; font-size:14px; font-weight:500; color:var(--color-text-primary); }
  .gate-btn:hover { background:var(--color-background-tertiary); }
  .gate-error { font-size:13px; color:var(--color-text-danger); margin-top:0.5rem; min-height:18px; }
  .content { display:none; padding:2rem; text-align:center; }
  .content h2 { font-size:22px; font-weight:500; color:var(--color-text-primary); }
  .content p { font-size:16px; color:var(--color-text-secondary); line-height:1.7; }
</style>

<div class="gate" id="gate">
  <div class="gate-card">
    <div class="gate-icon"><i class="ti ti-lock" aria-hidden="true"></i></div>
    <p class="gate-title">This page is private</p>
    <p class="gate-sub">Enter the password to continue</p>
    <input class="gate-input" type="password" id="pw" placeholder="Password" onkeydown="if(event.key==='Enter')check()" />
    <button class="gate-btn" onclick="check()">Continue</button>
    <p class="gate-error" id="err"></p>
  </div>
</div>

<div class="content" id="content">
  <h2>Welcome to CliQmates</h2>
  <p>Your pitch deck content will go here. This is just placeholder text for now so you can see how it looks once someone gets past the password gate.</p>
</div>

<script>
  function check() {
    const val = document.getElementById('pw').value;
    if (val === 'cliqmates') {
      document.getElementById('gate').style.display = 'none';
      document.getElementById('content').style.display = 'block';
    } else {
      document.getElementById('err').textContent = 'Incorrect password, please try again.';
      document.getElementById('pw').value = '';
      document.getElementById('pw').focus();
    }
  }
</script>
